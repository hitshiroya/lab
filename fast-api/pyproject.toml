[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
# E = pycodestyle errors
# F = pyflakes (unused imports, undefined names)
# I = isort (import ordering)
# UP = pyupgrade (modern Python syntax)

[tool.mypy]
python_version = "3.9"
strict = false
ignore_missing_imports = true